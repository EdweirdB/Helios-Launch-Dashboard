<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HELIOS — Launch Countdown</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="atmosphere" aria-hidden="true"></div>
  <div class="scanline" aria-hidden="true"></div>

  <header class="top">
    <div class="brand-block">
      <p class="eyebrow">Helios FinTech Corp</p>
      <h1 id="fleet-name">Platform Launch</h1>
    </div>
    <div class="header-meta">
      <div class="meta-pill">
        <span class="meta-label">Fleet clock</span>
        <span class="meta-value mono" id="now-clock">—</span>
      </div>
      <div class="meta-pill">
        <span class="meta-label">Data sync</span>
        <span class="meta-value mono" id="sync-status">boot</span>
      </div>
    </div>
  </header>

  <main>
    <section class="fleet-strip" id="fleet-strip" aria-label="Nearest launch">
      <div class="fleet-copy">
        <p class="fleet-label">Nearest launch</p>
        <h2 id="nearest-name">—</h2>
        <p class="fleet-sub" id="nearest-sub">Waiting for platform data…</p>
      </div>
      <div class="fleet-clock mono" id="nearest-clock" aria-live="polite">
        <div class="unit"><span data-u="d">00</span><label>Days</label></div>
        <div class="sep">:</div>
        <div class="unit"><span data-u="h">00</span><label>Hours</label></div>
        <div class="sep">:</div>
        <div class="unit"><span data-u="m">00</span><label>Mins</label></div>
        <div class="sep">:</div>
        <div class="unit"><span data-u="s">00</span><label>Secs</label></div>
      </div>
    </section>

    <section class="board" id="board" aria-label="Platform countdowns"></section>
  </main>

  <footer>
    <span>Edit <code>data/platforms.json</code> to update targets &amp; build counts</span>
    <span id="footer-note"></span>
  </footer>

  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-backdrop" id="drawer-backdrop"></div>
    <div class="drawer-panel" role="dialog" aria-modal="true" aria-labelledby="drawer-title">
      <button class="drawer-close" id="drawer-close" type="button" aria-label="Close details">×</button>
      <div class="drawer-head">
        <p class="eyebrow" id="drawer-status">—</p>
        <h2 id="drawer-title">—</h2>
        <p class="drawer-summary" id="drawer-summary"></p>
      </div>
      <div class="drawer-clock mono" id="drawer-clock">
        <div class="unit"><span data-u="d">00</span><label>Days</label></div>
        <div class="sep">:</div>
        <div class="unit"><span data-u="h">00</span><label>Hours</label></div>
        <div class="sep">:</div>
        <div class="unit"><span data-u="m">00</span><label>Mins</label></div>
        <div class="sep">:</div>
        <div class="unit"><span data-u="s">00</span><label>Secs</label></div>
      </div>
      <div class="drawer-progress">
        <div class="progress-row">
          <span id="drawer-build-label">Builds</span>
          <strong class="mono" id="drawer-build-count">0 / 0</strong>
        </div>
        <div class="bar"><span id="drawer-bar"></span></div>
        <p class="drawer-current" id="drawer-current"></p>
      </div>
      <div class="drawer-body" id="drawer-body"></div>
    </div>
  </aside>

  <script src="/app.js"></script>
</body>
</html>
